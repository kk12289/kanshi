<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}kanshi{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
  <header class="border-b border-slate-200 bg-white">
    <div class="mx-auto flex max-w-5xl items-center justify-between px-4 py-4 sm:px-6">
      <div class="min-w-0">
        <div class="truncate text-lg font-semibold tracking-tight">{% block header_name %}kanshi{% endblock %}</div>
      </div>
      <div class="text-sm font-medium text-slate-500">Status</div>
    </div>
  </header>

  <main class="mx-auto max-w-5xl px-4 py-8 sm:px-6">
    {% block content %}{% endblock %}
  </main>

  <footer class="mx-auto max-w-5xl px-4 pb-8 text-center text-xs text-slate-400 sm:px-6">
    Powered by kanshi
  </footer>
</body>
</html>
