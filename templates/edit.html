{% extends "base.html" %}
{% block title %}監視設定を編集 | kanshi{% endblock %}
{% block content %}
<div class="mx-auto max-w-2xl">
  <div class="mb-6">
    <h1 class="text-2xl font-semibold tracking-tight">監視設定を編集</h1>
    <p class="mt-2 text-sm text-slate-600">URLや通知設定を変更できます。過去のチェック履歴とインシデント履歴は保持されます。</p>
  </div>

  <form method="post" class="rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
    <input type="hidden" name="csrf_token" value="{{ csrf_token_value() }}">
    <div class="space-y-6">
      <label class="block">
        <span class="text-sm font-medium text-slate-700">サービス名</span>
        <span class="mt-1 block text-xs text-slate-500">ステータスページに表示される名前です</span>
        <input name="name" value="{{ name or '' }}" required class="mt-2 w-full rounded-md border border-slate-300 px-3 py-2 text-sm outline-none focus:border-slate-900 focus:ring-2 focus:ring-slate-200" placeholder="例：コーポレートサイト">
      </label>
      <label class="block">
        <span class="text-sm font-medium text-slate-700">監視URL</span>
        <span class="mt-1 block text-xs text-slate-500">https:// から始まるURLを入力してください</span>
        <input name="url" value="{{ url or '' }}" required class="mt-2 w-full rounded-md border border-slate-300 px-3 py-2 text-sm outline-none focus:border-slate-900 focus:ring-2 focus:ring-slate-200" placeholder="https://example.com">
      </label>
      <label class="block">
        <span class="text-sm font-medium text-slate-700">Discord Webhook URL</span>
        <span class="mt-1 block text-xs text-slate-500">Discordに通知したい場合のみ入力してください</span>
        <input name="discord_webhook" value="{{ discord_webhook or '' }}" class="mt-2 w-full rounded-md border border-slate-300 px-3 py-2 text-sm outline-none focus:border-slate-900 focus:ring-2 focus:ring-slate-200" placeholder="https://discord.com/api/webhooks/...">
      </label>
      <label class="block">
        <span class="text-sm font-medium text-slate-700">通知用メールアドレス</span>
        <span class="mt-1 block text-xs text-slate-500">障害発生・復旧時にメール通知を受け取りたい場合に入力してください</span>
        <input type="email" name="notification_email" value="{{ notification_email or '' }}" class="mt-2 w-full rounded-md border border-slate-300 px-3 py-2 text-sm outline-none focus:border-slate-900 focus:ring-2 focus:ring-slate-200" placeholder="alert@example.com">
      </label>

      <div class="rounded-md border border-slate-200 bg-slate-50 p-4">
        <div class="text-sm font-medium text-slate-700">通知設定</div>
        <div class="mt-3 space-y-3">
          <label class="flex items-start gap-3 text-sm text-slate-700">
            <input type="checkbox" name="enable_discord" class="mt-1 h-4 w-4 rounded border-slate-300" {% if enable_discord %}checked{% endif %}>
            <span>Discord通知を有効にする</span>
          </label>
          <label class="flex items-start gap-3 text-sm text-slate-700">
            <input type="checkbox" name="enable_email" class="mt-1 h-4 w-4 rounded border-slate-300" {% if enable_email %}checked{% endif %}>
            <span>メール通知を有効にする</span>
          </label>
        </div>
        <p class="mt-3 text-xs leading-5 text-slate-500">Webhook URLやメールアドレスが空欄の場合、その通知は送信されません。</p>
      </div>
    </div>
    <div class="mt-6 flex flex-col-reverse gap-3 sm:flex-row sm:justify-end">
      <a href="{{ url_for('index') }}" class="rounded-md border border-slate-300 px-4 py-2 text-center text-sm font-medium text-slate-700 hover:bg-slate-50">戻る</a>
      <button class="rounded-md bg-slate-900 px-4 py-2 text-sm font-medium text-white hover:bg-slate-700">保存する</button>
    </div>
  </form>
</div>
{% endblock %}
