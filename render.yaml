services:
  - type: web
    name: kanshi
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 1 app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: BASE_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: kanshi-db
          property: connectionString
      - key: FLASK_DEBUG
        value: "0"
      - key: SCHEDULER_ENABLED
        value: "1"
      - key: ALLOW_PRIVATE_URLS
        value: "0"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false

databases:
  - name: kanshi-db
